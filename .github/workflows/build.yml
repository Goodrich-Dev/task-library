name: Build & deploy Task Library
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # daily 6:00 UTC — picks up external skill repos + tracker edits
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pull the Asset Tracker's published-to-web CSV for status/owner overrides
      # and sheet-onboarded skills. Value is stored as the TRACKER_CSV_URL *secret*.
      # (Checked in the shell, not in `if:`, because a secret isn't reliably
      #  available to a step-level `if` expression.)
      - name: Fetch Asset Tracker CSV
        env:
          TRACKER_CSV_URL: ${{ secrets.TRACKER_CSV_URL }}
        run: |
          if [ -n "$TRACKER_CSV_URL" ]; then
            curl -sL "$TRACKER_CSV_URL" -o tracker.csv
            echo "Fetched tracker.csv ($(wc -l < tracker.csv) lines)."
          else
            echo "TRACKER_CSV_URL secret is empty; building without the sheet."
          fi

      - name: Build data.json
        env:
          SKILLS_READ_TOKEN: ${{ secrets.SKILLS_READ_TOKEN }}  # only needed for private external repos
        run: |
          if [ -f tracker.csv ]; then
            python3 build/build.py --tracker-csv tracker.csv
          else
            python3 build/build.py
          fi

      - name: Build pack zips
        run: python3 build/build-packs.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
